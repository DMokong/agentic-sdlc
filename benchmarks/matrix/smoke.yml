benchmark:
  prd: weather-transport
  runs_per_combination: 1

  constant_implementer:
    harness: claude-code
    model: sonnet-4-6
    process: superpowers
    permissions: dangerously-skip-permissions

  judge:
    model: opus-4-6

  # Smoke test: 2 targets (vanilla vs superpowers), Sonnet only, Claude Code only
  # Validates the full pipeline end-to-end at minimal cost
  # Expected: ~2 specs + 4 implementations + 4 reviews = ~6 LLM calls
  targets:
    - id: cc-vanilla-sonnet
      harness: claude-code
      model: sonnet-4-6
      process: vanilla

    - id: cc-sp-sonnet
      harness: claude-code
      model: sonnet-4-6
      process: superpowers
