# Gate 1: Spec Quality Scorecard
# Generated by the spec-scorer agent — do not edit manually

gate: spec-quality
spec_id:                    # e.g. SPEC-042
spec_path:                  # e.g. docs/specs/add-user-auth/spec.md
timestamp:                  # ISO 8601
scorer: llm-as-judge
model:                      # model that produced this score

scores:
  completeness:             # 1-10
  clarity:                  # 1-10
  testability:              # 1-10
  feasibility:              # 1-10 (NEW)
  scope:                    # 1-10 (NEW)
  overall:                  # weighted average

threshold:                  # from project config (e.g. 7.0)
dimension_minimum: 5        # NEW — each dimension must be >= this
result:                     # pass | fail

flags:
  blocking:                 # NEW — must be addressed for gate to pass
    # - "..."
  recommended:              # NEW — should be addressed
    # - "..."
  advisory:                 # NEW — nice to have
    # - "..."

# Human override (fill in manually if overriding a fail)
override:
  overridden: false
  justification:
  overridden_by:
  override_date:
